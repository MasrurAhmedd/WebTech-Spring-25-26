<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>masrur </title>
</head>
<body>
    <h2>Student Registration Page</h2>
    
    <form>
    
        Student Name:
        <input type="text" placeholder="Enter Your Name">
        <br><br>
    
        Student CGPA:
        <input type="text" placeholder="Enter Your CGPA">
        <br><br>
    
           Male
        <input type="radio" name="gender">
        <br>
    
          Female
          <input type="radio" name="gender">
        <br><br>
    
          Select Department:
        <select>
              <option>CSE</option>
            <option>EEE</option>
              <option>BBA</option>
           select>
          <br><br>
    
          Student ID
         <input type="text">
        <br><br>
    
          <br>
        <textarea rows="4" cols="30" placeholder="Enter your address here"></textarea>
           <br><br>
    
           Date of Birth:
        <input type="date">
          <br><br>
    
           Email:
        <input type="email" placeholder="Enter your email">
          <br><br>
    
        Upload your Grade Report:
        <input type="file">
        <br><br>
    
        I agree to the terms and conditions
        <input type="checkbox">
        <br><br>
    
        Phone Number:
        <input type="text" placeholder="Enter your phone number">
        <br><br>
    
        Submit your information
        <br>
        <input type="submit" value="Submit">
    
    </form>  
    
</body>
</html>
